# Comentario: Workflow de integración continua para bloquear cambios inseguros antes de producción.
name: CI producción

# Comentario: Ejecutar controles en pull requests y pushes a ramas principales.
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

# Comentario: Limitar permisos del token de GitHub Actions al mínimo necesario para lectura.
permissions:
  contents: read

# Comentario: Definir trabajos de validación sin despliegue automático.
jobs:
  quality-gate:
    # Comentario: Nombrar el job como puerta de calidad para producción.
    name: Puerta de calidad PHP, JS, SQL y API
    # Comentario: Usar Ubuntu mantenido por GitHub para herramientas estándar.
    runs-on: ubuntu-latest
    # Comentario: Levantar MySQL efímero para pruebas de integración reales.
    services:
      mysql:
        # Comentario: Usar imagen oficial MySQL 8 para validar compatibilidad del esquema.
        image: mysql:8.4
        # Comentario: Configurar credenciales no productivas exclusivas del runner CI.
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: caldera_biomasa_ci
        # Comentario: Publicar puerto local para PDO desde PHP en el runner.
        ports:
          - 3306:3306
        # Comentario: Esperar a que MySQL acepte conexiones antes de ejecutar tests.
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    # Comentario: Fijar timeout razonable para evitar ejecuciones colgadas.
    timeout-minutes: 35
    steps:
      # Comentario: Descargar el código del repositorio en el runner.
      - name: Checkout
        uses: actions/checkout@v4

      # Comentario: Instalar PHP CLI para lint y pruebas unitarias sin Composer.
      - name: Preparar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mysqli
          coverage: none

      # Comentario: Instalar Node.js para validación sintáctica del frontend.
      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Comentario: Instalar Arduino CLI oficial para compilar firmware en CI.
      - name: Preparar Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.x"

      # Comentario: Reutilizar cores Arduino descargados para reducir tiempo de CI.
      - name: Cache Arduino CLI
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino-cli-${{ runner.os }}-${{ hashFiles('tests/firmware/compile_firmware.sh') }}
          restore-keys: |
            arduino-cli-${{ runner.os }}-

      # Comentario: Ejecutar lint, pruebas unitarias y validaciones estáticas del repositorio.
      - name: Ejecutar puerta de calidad
        run: tests/backend/run_quality_checks.sh

      # Comentario: Ejecutar integración real contra MySQL efímero con esquema completo.
      - name: Ejecutar integración MySQL
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: caldera_biomasa_ci
          DB_USER: root
          DB_PASS: root
        run: php tests/backend/mysql_integration.php

      # Comentario: Compilar firmware Arduino Mega y ESP32 con Arduino CLI.
      - name: Compilar firmware Arduino
        run: tests/firmware/compile_firmware.sh

      # Comentario: Levantar backend PHP embebido con la misma base MySQL preparada por la integración.
      - name: Arrancar API local
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: caldera_biomasa_ci
          DB_USER: root
          DB_PASS: root
          DEVICE_API_KEY: clave-local-pruebas-hardening-no-productiva-123456
        run: |
          php -S 127.0.0.1:8091 -t server > /tmp/caldera-api.log 2>&1 &
          echo $! > /tmp/caldera-api.pid
          sleep 1

      # Comentario: Ejecutar prueba de humo contra API real con clave no productiva de CI.
      - name: Ejecutar smoke API
        env:
          API_BASE_URL: http://127.0.0.1:8091/api
          DEVICE_API_KEY: clave-local-pruebas-hardening-no-productiva-123456
        run: tests/backend/smoke_api.sh

      # Comentario: Ejecutar recorrido HTTP autenticado real contra sesión, CSRF y MySQL efímero.
      - name: Ejecutar API autenticada
        env:
          API_BASE_URL: http://127.0.0.1:8091/api
        run: tests/backend/authenticated_http_api.sh

      # Comentario: Mostrar log de backend solo si falla alguna prueba HTTP.
      - name: Mostrar log API si falla
        if: failure()
        run: cat /tmp/caldera-api.log || true

      # Comentario: Detener servidor embebido aunque el job haya fallado.
      - name: Detener API local
        if: always()
        run: |
          if [ -f /tmp/caldera-api.pid ]; then
            kill "$(cat /tmp/caldera-api.pid)" || true
          fi
